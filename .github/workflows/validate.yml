name: validate

# 贡献质量门：源注册表 schema + 配置 + manifest 校验。PR/push 改到 sources/config 时跑。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
    paths: ["asta-news/sources/**", "asta-news/config/**", "asta-news/rules.yaml", "**/.claude-plugin/*.json"]
  pull_request:
    paths: ["asta-news/sources/**", "asta-news/config/**", "asta-news/rules.yaml", "**/.claude-plugin/*.json"]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Validate registry + config + manifest
        run: uv run asta-news/scripts/validate_registry.py
