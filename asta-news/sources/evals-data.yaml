# 评测 / 榜单 / 数据集发布信号
sources:
  - id: swebench-leaderboard
    name: SWE-bench Leaderboards
    layers: [eval, agent, devtool]
    type: json
    parser: swebench
    url: https://raw.githubusercontent.com/swe-bench/swe-bench.github.io/master/data/leaderboards.json
    priority: P2
    freq: dormant
    verified: 2026-06-25
    notes: "上游自 2026-02-26 起休眠（最后条目 mini-SWE-agent + Claude 4.5 Opus），恢复更新后自动报新条目。降 P2 避免每天白抓"

  - id: evalplus
    name: EvalPlus Results
    layers: [eval, devtool]
    type: json
    parser: evalplus
    url: https://evalplus.github.io/results.json
    priority: P2
    freq: dormant
    verified: 2026-06-25
    notes: "HumanEval+/MBPP+ pass@1，无日期字段无法增量检测。数据格式为 {model: {pass@1: ...}}，上游长期未见新模型加入"

  - id: aider-polyglot
    name: Aider Polyglot Leaderboard
    layers: [eval, devtool]
    type: json
    parser: aider_yaml
    url: https://raw.githubusercontent.com/Aider-AI/aider/main/aider/website/_data/polyglot_leaderboard.yml
    priority: P2
    freq: dormant
    verified: 2026-06-25
    notes: "YAML 格式（parser 处理）。最后条目 2025-10-03，休眠超 8 个月"

  - id: livebench
    name: LiveBench
    layers: [eval, model]
    type: html
    url: https://livebench.ai
    priority: P2
    freq: monthly
    verified: 2026-06-12
    notes: "数据文件带日期戳（table_YYYY_MM_DD.json），需经 GitHub contents API（LiveBench/livebench.github.io 的 public/ 目录）发现最新文件名后抓取——策展 agent 按需做"

  - id: epoch-benchmarks
    name: Epoch AI Benchmarking Hub
    layers: [eval]
    type: html
    url: https://epoch.ai/data/ai-benchmarking-dashboard
    priority: P1
    freq: weekly
    verified: 2026-06-12
    notes: "独立复测 FrontierMath/SWE-bench V 等，并聚合 ARC-AGI/OSWorld/Aider/terminal-bench（这些榜单本体是 JS 渲染抓不到，用 Epoch 的 benchmark_data.zip 替代）"

  - id: lmarena
    name: LMArena Leaderboard
    layers: [eval, model, maas]
    type: html
    url: https://lmarena.ai/leaderboard
    priority: P1
    needs_proxy: true
    freq: weekly
    verified: 2026-06-12
    notes: "无官方 API；结构化快照在 HF dataset lmarena-ai/leaderboard-dataset（needs_proxy）；Elo 大变动才值得报"

  - id: hf-new-datasets
    name: HF Hub New Datasets
    layers: [data]
    type: json
    parser: hf_hub_list
    url: "https://huggingface.co/api/datasets?sort=createdAt&direction=-1&limit=30"
    priority: P1
    needs_proxy: true
    freq: daily
    verified: 2026-06-12
    notes: "数据集 firehose，策展时只挑有名团队/有规模/有新意的"

  - id: kaggle-datasets
    name: Kaggle New Datasets
    layers: [data]
    type: json
    parser: kaggle_datasets
    url: "https://www.kaggle.com/api/v1/datasets/list?sortBy=published&page=1"
    priority: P2
    freq: daily
    verified: 2026-06-12
    notes: "list 端点无需鉴权（下载才要 key）"

  - id: rewardbench
    name: RewardBench 2 (AllenAI)
    layers: [eval, post-training]
    type: html
    url: https://huggingface.co/spaces/allenai/reward-bench
    priority: P2
    needs_proxy: true
    freq: monthly
    verified: 2026-06-12
    notes: "唯一 reward model 榜，Space 页走代理 200 可达。机器信号看数据集 lastModified：allenai/reward-bench-2-results（v1 的 reward-bench-results 已于 2025-05 停更）；Space 本体 JS 渲染，策展 agent 必要时用 agent-browser"

  - id: artificial-analysis
    name: Artificial Analysis
    layers: [eval, serving, maas, business]
    type: json
    parser: generic
    url: https://artificialanalysis.ai/api/v2/data/llms/models
    priority: P2
    requires_env: [AA_API_KEY]
    headers_env: { x-api-key: AA_API_KEY }
    enabled: false
    freq: daily
    verified: 2026-06-12
    notes: "一次调用拿全行业 智能指数+价格+tokens/s+延迟；免费注册 API key 后 export AA_API_KEY 并 enable（鉴权头由 headers_env 声明，抓取器自动附带）"
